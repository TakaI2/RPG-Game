<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Map Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Meiryo', sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
        }

        h1 { margin-bottom: 20px; color: #cba6f7; }

        .controls {
            background: #181825;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid #45475a;
        }

        .control-group { margin-bottom: 12px; }

        .control-group label {
            display: inline-block;
            width: 140px;
            margin-right: 8px;
            color: #a6adc8;
            font-size: 0.875rem;
        }

        .control-group input, .control-group select {
            padding: 5px 10px;
            border: 1px solid #45475a;
            background: #313244;
            color: #cdd6f4;
            border-radius: 4px;
        }

        .control-group button {
            padding: 7px 14px;
            margin-right: 8px;
            background: #45475a;
            color: #cdd6f4;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .control-group button:hover { background: #585b70; }

        .control-group button.primary {
            background: #1e3a5f;
            color: #89b4fa;
            border: 1px solid #89b4fa;
        }

        .control-group button.primary:hover { background: #2a5080; }

        .tile-palette {
            background: #181825;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid #45475a;
        }

        .tile-palette h2 { margin-bottom: 12px; font-size: 1rem; color: #a6adc8; }

        .tile-options { display: flex; gap: 10px; flex-wrap: wrap; }

        .tile-option {
            width: 64px; height: 64px;
            border: 3px solid transparent;
            cursor: pointer; border-radius: 6px;
            transition: all 0.15s;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.9rem;
        }

        .tile-option:hover { transform: scale(1.08); }
        .tile-option.selected { border-color: #89b4fa; box-shadow: 0 0 10px #89b4fa88; }
        .tile-option.floor { background: #143d2a; color: #a6e3a1; }
        .tile-option.wall  { background: #3a3a4a; color: #cdd6f4; border-color: #45475a; }
        .tile-option.spawn-tile { background: #3a1f35; color: #f5c2e7; border-color: #45475a; }
        .tile-option.portal-tile { background: #1a1a3a; color: #cba6f7; border-color: #45475a; }

        .canvas-container {
            background: #181825;
            padding: 16px;
            border-radius: 8px;
            overflow: auto;
            max-height: 70vh;
            border: 1px solid #45475a;
        }

        canvas {
            border: 2px solid #45475a;
            display: block;
            image-rendering: pixelated;
            cursor: crosshair;
        }

        .info {
            margin-top: 10px;
            color: #6c7086;
            font-size: 0.8rem;
        }

        /* --- 敵選択モーダル --- */
        #enemyModal {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        #enemyModal.show { display: flex; }

        .modal-box {
            background: #1e1e2e;
            border: 1px solid #45475a;
            border-radius: 12px;
            width: 560px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 12px 16px;
            background: #313244;
            border-bottom: 1px solid #45475a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 { font-size: 1rem; color: #cba6f7; }

        .modal-header button {
            background: transparent;
            border: none;
            color: #a6adc8;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .modal-header button:hover { background: #45475a; color: #cdd6f4; }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }

        .modal-footer {
            padding: 10px 16px;
            background: #181825;
            border-top: 1px solid #313244;
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 0.8rem;
            color: #6c7086;
        }

        .modal-footer button {
            padding: 6px 14px;
            background: #2d1f4a;
            color: #cba6f7;
            border: 1px solid #cba6f7;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .modal-footer button:hover { background: #3d2a60; }

        .enemy-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .enemy-card {
            background: #181825;
            border: 2px solid #45475a;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.15s, background 0.15s;
        }

        .enemy-card:hover { background: #313244; border-color: #585b70; }
        .enemy-card.selected { border-color: #89b4fa; background: #1e3a5f22; }

        .enemy-card canvas {
            border: none;
            border-radius: 4px;
            background: #11111b;
            margin-bottom: 6px;
        }

        .enemy-card .ec-name {
            font-size: 0.82rem;
            color: #cdd6f4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .enemy-card .ec-type {
            font-size: 0.72rem;
            color: #6c7086;
        }

        .random-card {
            background: #181825;
            border: 2px dashed #45475a;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.15s, background 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .random-card:hover { background: #313244; border-color: #585b70; }
        .random-card.selected { border-color: #a6e3a1; }
        .random-card .rc-icon { font-size: 2rem; color: #a6adc8; margin-bottom: 6px; }
        .random-card .rc-label { font-size: 0.82rem; color: #a6adc8; }

        .btn-confirm {
            padding: 7px 18px;
            background: #1e3a5f;
            color: #89b4fa;
            border: 1px solid #89b4fa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: auto;
        }

        .btn-confirm:hover { background: #2a5080; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #181825; }
        ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #585b70; }

        /* --- タイル追加モーダル --- */
        #addTileModal {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #addTileModal.show { display: flex; }

        .add-tile-form { display: grid; grid-template-columns: 130px 1fr; gap: 10px 12px; align-items: center; }
        .add-tile-form label { color: #a6adc8; font-size: 0.875rem; }
        .add-tile-form input, .add-tile-form select {
            padding: 5px 10px; border: 1px solid #45475a;
            background: #313244; color: #cdd6f4; border-radius: 4px; width: 100%;
        }
        .add-tile-form input:disabled { opacity: 0.4; cursor: not-allowed; }

        .custom-tile-list { margin-top: 14px; }
        .custom-tile-list h4 { font-size: 0.85rem; color: #a6adc8; margin-bottom: 8px; }
        .custom-tile-item {
            display: flex; align-items: center; gap: 8px;
            padding: 5px 8px; background: #181825; border-radius: 4px; margin-bottom: 4px;
            border: 1px solid #45475a;
        }
        .custom-tile-swatch { width: 20px; height: 20px; border-radius: 3px; flex-shrink: 0; }
        .custom-tile-label { flex: 1; font-size: 0.82rem; color: #cdd6f4; }
        .custom-tile-meta { font-size: 0.72rem; color: #6c7086; }
        .custom-tile-del {
            background: transparent; border: 1px solid #f38ba8; color: #f38ba8;
            border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 0.75rem;
        }
        .custom-tile-del:hover { background: #f38ba822; }

        .tile-palette-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .tile-palette-header h2 { margin: 0; font-size: 1rem; color: #a6adc8; }
        .btn-add-tile {
            padding: 5px 12px; background: #1e3a5f; color: #89b4fa;
            border: 1px solid #89b4fa; border-radius: 6px; cursor: pointer; font-size: 0.82rem;
        }
        .btn-add-tile:hover { background: #2a5080; }

        .tile-option {
            position: relative;
            background-size: cover !important;
            background-position: center !important;
        }
        .tile-option .tile-label {
            position: absolute; bottom: 2px; left: 0; right: 0;
            text-align: center; font-size: 0.7rem;
            background: rgba(0,0,0,0.5); padding: 1px 0;
        }
    </style>
</head>
<body>
    <h1>RPG Map Editor</h1>

    <div class="controls">
        <div class="control-group">
            <label>マップ幅 (cols):</label>
            <input type="number" id="cols" value="80" min="10" max="200">
        </div>
        <div class="control-group">
            <label>マップ高さ (rows):</label>
            <input type="number" id="rows" value="80" min="10" max="200">
        </div>
        <div class="control-group">
            <label>タイルサイズ:</label>
            <input type="number" id="tileSize" value="64" min="16" max="128" disabled>
            <span style="color:#6c7086; font-size:0.8rem; margin-left:6px;">px (固定)</span>
        </div>
        <div class="control-group">
            <button class="primary" onclick="createNewMap()">新規マップ作成</button>
            <button onclick="clearMap()">マップをクリア</button>
        </div>
        <div class="control-group">
            <button class="primary" onclick="exportMap()">JSONエクスポート</button>
            <button onclick="document.getElementById('fileInput').click()">JSONインポート</button>
            <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importMap(event)">
        </div>
    </div>

    <div class="tile-palette">
        <div class="tile-palette-header">
            <h2>タイルパレット</h2>
            <div style="display:flex; gap:8px; align-items:center;">
                <label style="padding:5px 12px; background:#1e3a5f; color:#89b4fa; border:1px solid #89b4fa; border-radius:6px; cursor:pointer; font-size:0.82rem;">
                    tilesets.json 読み込み
                    <input type="file" accept=".json" style="display:none" onchange="loadTilesetsFromFile(event)">
                </label>
                <button class="btn-add-tile" onclick="openAddTileModal()">+ タイル追加</button>
            </div>
        </div>
        <div class="tile-options" id="tileOptions">
            <!-- tilesets.json + localStorage から動的生成 -->
        </div>
    </div>

    <!-- タイル追加モーダル -->
    <div id="addTileModal">
        <div class="modal-box" style="width:480px;">
            <div class="modal-header">
                <h3>タイルを追加</h3>
                <button onclick="closeAddTileModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="add-tile-form">
                    <label>ラベル名</label>
                    <input type="text" id="atLabel" placeholder="例: 草原">
                    <label>ロール</label>
                    <select id="atRole">
                        <option value="floor">床（通過可能）</option>
                        <option value="wall">壁（通過不可）</option>
                    </select>
                    <label>表示色</label>
                    <input type="color" id="atColor" value="#2a5a1a">
                    <label>テクスチャキー</label>
                    <input type="text" id="atTextureKey" placeholder="例: tile_grass（省略可）">
                    <label>アニメーション</label>
                    <input type="checkbox" id="atAnimated" onchange="toggleFpsField(this.checked)" style="width:auto;">
                    <label>アニメFPS</label>
                    <input type="number" id="atFps" value="8" min="1" max="30" disabled>
                </div>
                <div class="custom-tile-list">
                    <h4>追加済みタイル</h4>
                    <div id="customTileList"></div>
                </div>
            </div>
            <div class="modal-footer">
                <span style="font-size:0.8rem;color:#6c7086;">追加したタイルはブラウザに保存されます</span>
                <button class="btn-confirm" onclick="addCustomTile()">追加</button>
            </div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="mapCanvas"></canvas>
        <div class="info">
            左クリック: タイル配置（敵タイル選択時はキャラ選択モーダルが開きます） |
            右クリック: 削除 |
            ドラッグ: 連続配置 |
            マウス位置: <span id="mousePos">-</span>
        </div>
    </div>

    <!-- 敵選択モーダル -->
    <div id="enemyModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>敵キャラを選択</h3>
                <button onclick="closeEnemyModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="enemy-grid" id="enemyGrid"></div>
            </div>
            <div class="modal-footer">
                <button onclick="openEnemyEditor()">+ 新規作成 (Enemy Editor)</button>
                <label style="padding:5px 10px; background:#313244; color:#a6adc8; border:1px solid #45475a; border-radius:6px; cursor:pointer; font-size:0.82rem;">
                    enemy-defs.json 読み込み
                    <input type="file" accept=".json" style="display:none" onchange="loadEnemyDefsFromFile(event)">
                </label>
                <button class="btn-confirm" onclick="confirmEnemySelection()">決定</button>
            </div>
        </div>
    </div>

    <script>
    const TILE_SIZE = 64
    const SHEET_COLS = 16
    const FRAME_SIZE = 64
    const STORAGE_KEY = 'rpg-enemy-defs'
    const CUSTOM_TILES_KEY = 'rpg-custom-tiles'
    const BASE_DEFS_KEY = 'rpg-base-tiles'
    const TILESET_URL = '../../public/assets/maps/tilesets.json'
    const ENEMY_DEFS_URL = '../../public/assets/enemies/enemy-defs.json'

    let canvas, ctx
    let cols = 80, rows = 80
    let mapData = []
    let enemySpawns = []   // { x, y, enemyDefId?: string }
    let portals = []       // { x, y }
    let selectedTile = 0
    let isDrawing = false

    // タイルセット
    let baseDefs = []    // tilesets.json から読み込んだ定義
    let customDefs = []  // localStorage から読み込んだカスタム定義
    let allDefs = []     // baseDefs + customDefs のマージ
    let tileImageCache = {}  // id → HTMLImageElement（またはnull）

    // モーダル用
    let pendingSpawnPos = null   // { x, y } – モーダルを開いた際の仮位置
    let selectedEnemyDefId = null  // null = ランダム
    let enemyDefs = []
    let spriteCache = {}  // spriteKey → HTMLImageElement

    // ---- Init ----
    window.onload = () => {
        canvas = document.getElementById('mapCanvas')
        ctx = canvas.getContext('2d')

        canvas.addEventListener('mousedown', handleMouseDown)
        canvas.addEventListener('mousemove', handleMouseMove)
        canvas.addEventListener('mouseup', handleMouseUp)
        canvas.addEventListener('mouseleave', handleMouseUp)
        canvas.addEventListener('contextmenu', e => e.preventDefault())

        loadEnemyDefs()
        loadTilesets()  // パレットを動的生成（完了後に createNewMap を呼ぶ）
    }

    // ---- Tileset ----
    async function loadTilesets() {
        // fetch を試みる（file:// では失敗するので localStorage にフォールバック）
        try {
            const res = await fetch(TILESET_URL)
            if (res.ok) {
                baseDefs = await res.json()
                localStorage.setItem(BASE_DEFS_KEY, JSON.stringify(baseDefs))
            } else {
                throw new Error('fetch failed')
            }
        } catch {
            try {
                const cached = localStorage.getItem(BASE_DEFS_KEY)
                baseDefs = cached ? JSON.parse(cached) : []
            } catch {
                baseDefs = []
            }
        }
        try {
            const raw = localStorage.getItem(CUSTOM_TILES_KEY)
            customDefs = raw ? JSON.parse(raw) : []
        } catch {
            customDefs = []
        }
        allDefs = [...baseDefs, ...customDefs]
        renderPalette()
        createNewMap()
    }

    function loadTilesetsFromFile(event) {
        const file = event.target.files[0]
        if (!file) return
        const reader = new FileReader()
        reader.onload = e => {
            try {
                baseDefs = JSON.parse(e.target.result)
                localStorage.setItem(BASE_DEFS_KEY, JSON.stringify(baseDefs))
                allDefs = [...baseDefs, ...customDefs]
                renderPalette()
                drawMap()
            } catch (err) {
                alert('読み込みエラー: ' + err.message)
            }
        }
        reader.readAsText(file)
        event.target.value = ''
    }

    function renderPalette() {
        const container = document.getElementById('tileOptions')
        container.innerHTML = ''

        allDefs.forEach(def => {
            const el = document.createElement('div')
            const roleClass = def.role === 'wall' ? 'wall' : 'floor'
            el.className = `tile-option ${roleClass}`
            el.setAttribute('data-tile', String(def.id))
            el.title = `${def.label} (id:${def.id}, ${def.role})`
            el.style.background = def.color

            // テキストラベル
            const labelEl = document.createElement('span')
            labelEl.className = 'tile-label'
            labelEl.textContent = def.label
            el.appendChild(labelEl)

            // 画像ロードを試みる（アニメタイルは1コマ目のみ切り出し）
            if (def.textureKey) {
                const img = new Image()
                img.onload = () => {
                    tileImageCache[def.id] = img
                    drawMap()
                    try {
                        const c = document.createElement('canvas')
                        c.width = 64; c.height = 64
                        c.getContext('2d').drawImage(img, 0, 0, 64, 64, 0, 0, 64, 64)
                        el.style.backgroundImage = `url(${c.toDataURL()})`
                        el.style.backgroundSize = 'cover'
                        labelEl.textContent = ''
                    } catch {
                        // file:// のセキュリティ制限で toDataURL が失敗してもキャンバス描画は続行
                    }
                }
                img.src = `../../public/assets/images/maptip/${def.textureKey}.png`
            }

            el.addEventListener('click', () => selectTile(el, def.id))
            container.appendChild(el)
        })

        // 特殊タイル（敵スポーン / ポータル）は固定で追加
        const spawnEl = document.createElement('div')
        spawnEl.className = 'tile-option spawn-tile'
        spawnEl.setAttribute('data-tile', 'spawn')
        spawnEl.title = '敵スポーン（左クリックで配置→キャラ選択）'
        spawnEl.textContent = '敵'
        spawnEl.addEventListener('click', () => selectTile(spawnEl, 'spawn'))
        container.appendChild(spawnEl)

        const portalEl = document.createElement('div')
        portalEl.className = 'tile-option portal-tile'
        portalEl.setAttribute('data-tile', 'portal')
        portalEl.title = 'ポータル（左クリックで配置、右クリックで削除）'
        portalEl.textContent = '\uD83D\uDEAA'
        portalEl.addEventListener('click', () => selectTile(portalEl, 'portal'))
        container.appendChild(portalEl)

        // 初期選択（id=0 の床）
        const first = container.querySelector('[data-tile="0"]')
        if (first) first.classList.add('selected')
        selectedTile = 0
    }

    function selectTile(el, value) {
        document.querySelectorAll('.tile-option').forEach(o => o.classList.remove('selected'))
        el.classList.add('selected')
        selectedTile = (value === 'spawn' || value === 'portal') ? value : parseInt(value)
    }

    // ---- カスタムタイル追加/削除 ----
    function openAddTileModal() {
        renderCustomTileList()
        document.getElementById('addTileModal').classList.add('show')
    }

    function closeAddTileModal() {
        document.getElementById('addTileModal').classList.remove('show')
    }

    function toggleFpsField(checked) {
        document.getElementById('atFps').disabled = !checked
    }

    function addCustomTile() {
        const label = document.getElementById('atLabel').value.trim()
        const textureKey = document.getElementById('atTextureKey').value.trim()
        if (!label) { alert('ラベル名を入力してください'); return }

        const maxId = allDefs.length > 0 ? Math.max(...allDefs.map(d => d.id)) : -1
        const newDef = {
            id: maxId + 1,
            role: document.getElementById('atRole').value,
            textureKey: textureKey || `custom_tile_${maxId + 1}`,
            label,
            color: document.getElementById('atColor').value,
            animated: document.getElementById('atAnimated').checked,
            fps: parseInt(document.getElementById('atFps').value) || 8,
        }

        customDefs.push(newDef)
        localStorage.setItem(CUSTOM_TILES_KEY, JSON.stringify(customDefs))
        allDefs = [...baseDefs, ...customDefs]

        // フォームをリセット
        document.getElementById('atLabel').value = ''
        document.getElementById('atTextureKey').value = ''
        document.getElementById('atAnimated').checked = false
        document.getElementById('atFps').disabled = true
        document.getElementById('atFps').value = '8'

        renderPalette()
        renderCustomTileList()
    }

    function removeCustomTile(id) {
        customDefs = customDefs.filter(d => d.id !== id)
        localStorage.setItem(CUSTOM_TILES_KEY, JSON.stringify(customDefs))
        allDefs = [...baseDefs, ...customDefs]
        delete tileImageCache[id]
        renderPalette()
        renderCustomTileList()
    }

    function renderCustomTileList() {
        const container = document.getElementById('customTileList')
        container.innerHTML = ''
        if (customDefs.length === 0) {
            container.innerHTML = '<p style="color:#6c7086;font-size:0.8rem;">追加済みのタイルはありません</p>'
            return
        }
        customDefs.forEach(def => {
            const item = document.createElement('div')
            item.className = 'custom-tile-item'
            item.innerHTML = `
                <div class="custom-tile-swatch" style="background:${def.color}"></div>
                <span class="custom-tile-label">${def.label}</span>
                <span class="custom-tile-meta">${def.role} / id:${def.id}${def.animated ? ` / ${def.fps}fps` : ''}</span>
                <button class="custom-tile-del" onclick="removeCustomTile(${def.id})">削除</button>
            `
            container.appendChild(item)
        })
    }

    // ---- Enemy Defs ----
    async function loadEnemyDefs() {
        // localStorage にあればそれを使う（enemy-editor との共有）
        try {
            const raw = localStorage.getItem(STORAGE_KEY)
            if (raw) {
                enemyDefs = JSON.parse(raw)
                return
            }
        } catch { /* fall through */ }

        // なければ enemy-defs.json から fetch（file:// では失敗するので無音で続行）
        try {
            const res = await fetch(ENEMY_DEFS_URL)
            if (res.ok) {
                enemyDefs = await res.json()
                localStorage.setItem(STORAGE_KEY, JSON.stringify(enemyDefs))
                return
            }
        } catch { /* fall through */ }

        enemyDefs = []
    }

    function loadEnemyDefsFromFile(event) {
        const file = event.target.files[0]
        if (!file) return
        const reader = new FileReader()
        reader.onload = e => {
            try {
                enemyDefs = JSON.parse(e.target.result)
                localStorage.setItem(STORAGE_KEY, JSON.stringify(enemyDefs))
                // モーダルが開いていれば再描画
                if (document.getElementById('enemyModal').classList.contains('show')) {
                    buildEnemyGrid()
                }
            } catch (err) {
                alert('読み込みエラー: ' + err.message)
            }
        }
        reader.readAsText(file)
        event.target.value = ''
    }

    // ---- Map Ops ----
    function createNewMap() {
        cols = parseInt(document.getElementById('cols').value)
        rows = parseInt(document.getElementById('rows').value)
        mapData = Array(rows).fill(null).map(() => Array(cols).fill(0))
        enemySpawns = []
        portals = []
        canvas.width = cols * TILE_SIZE
        canvas.height = rows * TILE_SIZE
        drawMap()
    }

    function clearMap() {
        if (!confirm('マップをクリアしますか？')) return
        mapData = Array(rows).fill(null).map(() => Array(cols).fill(0))
        enemySpawns = []
        portals = []
        drawMap()
    }

    // ---- Draw ----
    function drawMap() {
        ctx.clearRect(0, 0, canvas.width, canvas.height)
        for (let y = 0; y < rows; y++)
            for (let x = 0; x < cols; x++)
                drawTile(x, y, mapData[y][x])
        enemySpawns.forEach(s => drawSpawn(s))
        portals.forEach(p => drawPortal(p))
        drawGrid()
    }

    function drawTile(x, y, tileId) {
        const px = x * TILE_SIZE, py = y * TILE_SIZE
        const def = allDefs.find(d => d.id === tileId)
        const color = def ? def.color : '#143d2a'
        const isWall = def ? def.role === 'wall' : false

        // キャッシュ済み画像があれば描画（アニメタイルは1コマ目を使用）
        const img = tileImageCache[tileId]
        if (img) {
            ctx.imageSmoothingEnabled = false
            ctx.drawImage(img, 0, 0, 64, 64, px, py, TILE_SIZE, TILE_SIZE)
            return
        }

        // フォールバック: color で塗りつぶし
        ctx.fillStyle = color
        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE)
        if (isWall) {
            ctx.strokeStyle = 'rgba(0,0,0,0.3)'
            ctx.lineWidth = 2
            ctx.strokeRect(px + 1, py + 1, TILE_SIZE - 2, TILE_SIZE - 2)
        }
    }

    function drawSpawn(spawn) {
        const px = spawn.x * TILE_SIZE
        const py = spawn.y * TILE_SIZE
        const cx = px + TILE_SIZE / 2
        const cy = py + TILE_SIZE / 2

        // def があればスプライト表示を試みる
        const def = spawn.enemyDefId ? enemyDefs.find(d => d.id === spawn.enemyDefId) : null
        if (def && def.spriteKey) {
            const chromaCanvas = getChromaCanvas(def.spriteKey)
            if (chromaCanvas) {
                // idle down frame 0: row=2, col=0
                const frameIndex = 2 * SHEET_COLS + 0
                const srcX = (frameIndex % SHEET_COLS) * FRAME_SIZE
                const srcY = Math.floor(frameIndex / SHEET_COLS) * FRAME_SIZE
                ctx.imageSmoothingEnabled = false
                ctx.drawImage(chromaCanvas, srcX, srcY, FRAME_SIZE, FRAME_SIZE, px, py, TILE_SIZE, TILE_SIZE)
                // ラベル
                ctx.fillStyle = '#f5c2e788'
                ctx.fillRect(px, py + TILE_SIZE - 16, TILE_SIZE, 16)
                ctx.fillStyle = '#1e1e2e'
                ctx.font = 'bold 10px sans-serif'
                ctx.textAlign = 'center'
                ctx.textBaseline = 'middle'
                ctx.fillText(def.name || def.id, cx, py + TILE_SIZE - 8)
                return
            }
        }

        // デフォルト: 赤丸
        ctx.fillStyle = '#f38ba8'
        ctx.beginPath()
        ctx.arc(cx, cy, TILE_SIZE / 3, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#ffffff'
        ctx.font = 'bold 16px sans-serif'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText('敵', cx, cy)
        if (spawn.enemyDefId) {
            ctx.font = 'bold 10px sans-serif'
            ctx.fillStyle = '#f9e2af'
            ctx.fillText(spawn.enemyDefId, cx, cy + 18)
        }
    }

    function drawPortal(portal) {
        const px = portal.x * TILE_SIZE
        const py = portal.y * TILE_SIZE
        const cx = px + TILE_SIZE / 2
        const cy = py + TILE_SIZE / 2
        const img = getChromaCanvas('door')
        if (img) {
            ctx.imageSmoothingEnabled = false
            ctx.drawImage(img, 0, 0, FRAME_SIZE, FRAME_SIZE, px, py, TILE_SIZE, TILE_SIZE)
            return
        }
        // フォールバック: 絵文字（未ロード時）
        ctx.fillStyle = '#1a1a3a99'
        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE)
        ctx.font = `${Math.floor(TILE_SIZE * 0.65)}px sans-serif`
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText('\uD83D\uDEAA', cx, cy)
    }

    function drawGrid() {
        ctx.strokeStyle = '#ffffff08'
        ctx.lineWidth = 1
        for (let x = 0; x <= cols; x++) {
            ctx.beginPath(); ctx.moveTo(x * TILE_SIZE, 0); ctx.lineTo(x * TILE_SIZE, canvas.height); ctx.stroke()
        }
        for (let y = 0; y <= rows; y++) {
            ctx.beginPath(); ctx.moveTo(0, y * TILE_SIZE); ctx.lineTo(canvas.width, y * TILE_SIZE); ctx.stroke()
        }
    }

    // ---- Sprite Image Cache ----
    function getChromaCanvas(spriteKey) {
        if (spriteCache[spriteKey] !== undefined) return spriteCache[spriteKey]
        // 非同期なので null をキャッシュしてロード完了後に再描画
        spriteCache[spriteKey] = null
        const img = new Image()
        img.onload = () => {
            spriteCache[spriteKey] = img
            drawMap()  // 再描画
        }
        img.onerror = () => { spriteCache[spriteKey] = null }
        img.src = `../../public/assets/images/${spriteKey}.png`
        return null
    }

    // ---- Mouse Events ----
    function handleMouseDown(e) {
        isDrawing = true
        placeTile(e)
    }
    function handleMouseMove(e) {
        const rect = canvas.getBoundingClientRect()
        const x = Math.floor((e.clientX - rect.left) / TILE_SIZE)
        const y = Math.floor((e.clientY - rect.top) / TILE_SIZE)
        document.getElementById('mousePos').textContent = `(${x}, ${y})`
        if (isDrawing) placeTile(e)
    }
    function handleMouseUp() { isDrawing = false }

    function placeTile(e) {
        const rect = canvas.getBoundingClientRect()
        const x = Math.floor((e.clientX - rect.left) / TILE_SIZE)
        const y = Math.floor((e.clientY - rect.top) / TILE_SIZE)
        if (x < 0 || x >= cols || y < 0 || y >= rows) return

        if (e.button === 2) {
            // 右クリック: 削除（タイル・敵スポーン・ポータル）
            mapData[y][x] = 0
            enemySpawns = enemySpawns.filter(s => !(s.x === x && s.y === y))
            portals = portals.filter(p => !(p.x === x && p.y === y))
            drawMap()
        } else if (selectedTile === 'portal') {
            // ポータル配置（重複不可）
            const exists = portals.some(p => p.x === x && p.y === y)
            if (!exists) {
                portals.push({ x, y })
                isDrawing = false
                drawMap()
            }
        } else if (selectedTile === 'spawn') {
            // 左クリック: スポーン → モーダルを開く
            const exists = enemySpawns.some(s => s.x === x && s.y === y)
            if (!exists) {
                isDrawing = false
                openEnemyModal(x, y)
            }
        } else {
            mapData[y][x] = selectedTile
            drawMap()
        }
    }

    // ---- Enemy Modal ----
    async function openEnemyModal(x, y) {
        await loadEnemyDefs()
        pendingSpawnPos = { x, y }
        selectedEnemyDefId = null
        buildEnemyGrid()
        document.getElementById('enemyModal').classList.add('show')
    }

    function buildEnemyGrid() {
        const grid = document.getElementById('enemyGrid')
        grid.innerHTML = ''

        // ランダムカード
        const randCard = document.createElement('div')
        randCard.className = 'random-card selected'
        randCard.dataset.defId = ''
        randCard.innerHTML = `<div class="rc-icon">🎲</div><div class="rc-label">ランダム（指定なし）</div>`
        randCard.addEventListener('click', () => {
            document.querySelectorAll('.enemy-card, .random-card').forEach(c => c.classList.remove('selected'))
            randCard.classList.add('selected')
            selectedEnemyDefId = null
        })
        grid.appendChild(randCard)

        // 各キャラカード
        enemyDefs.forEach(def => {
            const card = document.createElement('div')
            card.className = 'enemy-card'
            card.dataset.defId = def.id

            const miniCanvas = document.createElement('canvas')
            miniCanvas.width = 64; miniCanvas.height = 64
            drawMiniSprite(miniCanvas, def.spriteKey)

            const nameEl = document.createElement('div')
            nameEl.className = 'ec-name'
            nameEl.textContent = def.name || def.id

            const typeEl = document.createElement('div')
            typeEl.className = 'ec-type'
            typeEl.textContent = def.enemyType

            card.appendChild(miniCanvas)
            card.appendChild(nameEl)
            card.appendChild(typeEl)
            card.addEventListener('click', () => {
                document.querySelectorAll('.enemy-card, .random-card').forEach(c => c.classList.remove('selected'))
                card.classList.add('selected')
                selectedEnemyDefId = def.id
            })
            grid.appendChild(card)
        })
    }

    function closeEnemyModal() {
        document.getElementById('enemyModal').classList.remove('show')
        pendingSpawnPos = null
    }

    function confirmEnemySelection() {
        if (!pendingSpawnPos) { closeEnemyModal(); return }
        const { x, y } = pendingSpawnPos
        const spawn = { x, y }
        if (selectedEnemyDefId) spawn.enemyDefId = selectedEnemyDefId
        enemySpawns.push(spawn)
        closeEnemyModal()
        drawMap()
    }

    function openEnemyEditor() {
        window.open('../enemy-editor/', '_blank')
    }

    // ---- Mini Sprite ----
    function drawMiniSprite(canvas, spriteKey) {
        if (!spriteKey) return
        const img = new Image()
        img.onload = () => {
            const frameIndex = 2 * SHEET_COLS + 0
            const srcX = (frameIndex % SHEET_COLS) * FRAME_SIZE
            const srcY = Math.floor(frameIndex / SHEET_COLS) * FRAME_SIZE
            const c = canvas.getContext('2d')
            c.clearRect(0, 0, canvas.width, canvas.height)
            c.imageSmoothingEnabled = false
            c.drawImage(img, srcX, srcY, FRAME_SIZE, FRAME_SIZE, 0, 0, canvas.width, canvas.height)
        }
        img.src = `../../public/assets/images/${spriteKey}.png`
    }

    // ---- Export / Import ----
    function exportMap() {
        const mapJSON = { cols, rows, tiles: mapData, enemySpawns, portals }
        const json = JSON.stringify(mapJSON, null, 2)
        const blob = new Blob([json], { type: 'application/json' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url; a.download = 'map.json'; a.click()
        URL.revokeObjectURL(url)
        alert('マップをエクスポートしました！')
    }

    function importMap(event) {
        const file = event.target.files[0]
        if (!file) return
        const reader = new FileReader()
        reader.onload = e => {
            try {
                const j = JSON.parse(e.target.result)
                cols = j.cols; rows = j.rows
                mapData = j.tiles
                enemySpawns = (j.enemySpawns || []).map(s => ({
                    x: s.x, y: s.y,
                    ...(s.enemyDefId ? { enemyDefId: s.enemyDefId } : {})
                }))
                portals = (j.portals || []).map(p => ({ x: p.x, y: p.y }))
                document.getElementById('cols').value = cols
                document.getElementById('rows').value = rows
                canvas.width = cols * TILE_SIZE
                canvas.height = rows * TILE_SIZE
                loadEnemyDefs()
                drawMap()
                alert('マップをインポートしました！')
            } catch (err) {
                alert('インポートエラー: ' + err.message)
            }
        }
        reader.readAsText(file)
    }
    </script>
